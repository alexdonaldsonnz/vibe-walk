<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Vibe Walk</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', monospace;
  background: #000;
  color: #e0e0e0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px 10px;
  border-bottom: 1px solid #1a1a1a;
  flex-shrink: 0;
}

#status-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
  flex-shrink: 0;
}
#status-dot.listening { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
#status-dot.thinking  { background: #eab308; box-shadow: 0 0 8px #eab30888; }
#status-dot.speaking  { background: #3b82f6; box-shadow: 0 0 8px #3b82f688; }
#status-dot.error     { background: #ef4444; }

#status-text {
  font-size: 13px;
  color: #888;
  flex: 1;
}

#main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 0 0 8px;
}

.section {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
  border-bottom: 1px solid #111;
}

.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: #444;
  text-transform: uppercase;
  padding: 8px 16px 4px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.section-label span { flex: 1; }

#send-btn {
  background: #22c55e;
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  -webkit-tap-highlight-color: transparent;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}

#send-btn.visible {
  opacity: 1;
  pointer-events: auto;
}

#send-btn:active { background: #16a34a; }
#send-btn:disabled { background: #555; color: #888; }

.section-body {
  flex: 1;
  overflow-y: auto;
  padding: 4px 16px 8px;
  font-size: 15px;
  line-height: 1.55;
  word-break: break-word;
  -webkit-overflow-scrolling: touch;
}

#transcript-body { color: #aaa; }
#response-body   { color: #e8e8e8; white-space: pre-wrap; }

.pending-word { color: #888; font-style: italic; }
.submitted    { color: #666; }

.post-response-sep {
  margin-top: 14px;
  padding-top: 12px;
  border-top: 1px solid #1e1e1e;
}
.post-response-transcript { color: #aaa; }

#response-body.thinking-state { color: #888; font-style: italic; }

#start-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  z-index: 100;
}

#start-overlay h1 {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.02em;
}

#start-overlay p {
  font-size: 14px;
  color: #666;
  text-align: center;
  max-width: 280px;
  line-height: 1.5;
}

#start-btn {
  background: #22c55e;
  color: #000;
  border: none;
  border-radius: 100px;
  padding: 16px 40px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

#start-btn:active { background: #16a34a; }

#error-banner {
  display: none;
  background: #2a0000;
  color: #f87171;
  font-size: 13px;
  padding: 8px 16px;
  flex-shrink: 0;
}
</style>
</head>
<body>

<div id="start-overlay">
  <h1>Vibe Walk</h1>
  <p>Talk to Claude Code while walking.<br>Say <strong>"submit prompt"</strong> to send.</p>
  <button id="start-btn">Start Session</button>
</div>

<div id="header">
  <div id="status-dot"></div>
  <span id="status-text">Connecting…</span>
</div>

<div id="error-banner"></div>

<div id="main">
  <div class="section" style="flex: 0.6;">
    <div class="section-label">
      <span>You said</span>
      <button id="send-btn">Send</button>
    </div>
    <div class="section-body" id="transcript-body" contenteditable="true" spellcheck="false"></div>
  </div>
  <div class="section" style="flex: 1.4;">
    <div class="section-label">Claude</div>
    <div class="section-body" id="response-body"></div>
  </div>
</div>

<script>
const WS_URL = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`;

let ws = null;
let audioCtx = null;
let workletNode = null;
let mediaStream = null;
let nextPlayTime = 0;
let isCapturing = false;
let postResponse = false;

// ── AudioWorklet (inlined as Blob) ───────────────────────────────────────────
const WORKLET_CODE = `
class AudioCaptureProcessor extends AudioWorkletProcessor {
  constructor() {
    super();
    this._buf = [];
    this._chunkSize = sampleRate * 1; // 1 second chunks
  }
  process(inputs) {
    const ch = inputs[0]?.[0];
    if (!ch) return true;
    for (let i = 0; i < ch.length; i++) this._buf.push(ch[i]);
    if (this._buf.length >= this._chunkSize) {
      const out = new Float32Array(this._buf.splice(0, this._chunkSize));
      this.port.postMessage(out.buffer, [out.buffer]);
    }
    return true;
  }
}
registerProcessor('audio-capture', AudioCaptureProcessor);
`;

// ── DOM helpers ──────────────────────────────────────────────────────────────
const $statusDot  = document.getElementById('status-dot');
const $statusText = document.getElementById('status-text');
const $transcript = document.getElementById('transcript-body');
const $response   = document.getElementById('response-body');
const $error      = document.getElementById('error-banner');
const $sendBtn    = document.getElementById('send-btn');

const STATUS_LABELS = {
  connecting: 'Connecting…',
  listening:  '🎤 Listening',
  thinking:   '🤔 Claude is thinking…',
  speaking:   '🔊 Playing response',
  error:      'Error',
};

function setStatus(state) {
  $statusDot.className = state;
  $statusText.textContent = STATUS_LABELS[state] ?? state;
}

function updateSendBtn() {
  const hasText = $transcript.innerText.trim().length > 0;
  $sendBtn.classList.toggle('visible', hasText);
}

function appendTranscript(text) {
  if (postResponse) {
    if (!$response.querySelector('.post-response-sep')) {
      const sep = document.createElement('div');
      sep.className = 'post-response-sep';
      $response.appendChild(sep);
    }
    const span = document.createElement('span');
    span.className = 'post-response-transcript';
    span.textContent = text + ' ';
    $response.appendChild(span);
    $response.scrollTop = $response.scrollHeight;
  } else {
    const span = document.createElement('span');
    span.textContent = text + ' ';
    $transcript.appendChild(span);
    $transcript.scrollTop = $transcript.scrollHeight;
    updateSendBtn();
  }
}

function markTranscriptSubmitted() {
  $transcript.querySelectorAll('span').forEach(s => s.className = 'submitted');
  $sendBtn.classList.remove('visible');
  $sendBtn.disabled = true;
}

function resetTranscriptAfterResponse() {
  $transcript.innerHTML = '';
  $sendBtn.disabled = false;
  updateSendBtn();
}

function appendResponse(text) {
  const existing = $response.lastChild;
  if (existing && existing.nodeType === Node.TEXT_NODE) {
    existing.textContent += text;
  } else {
    $response.appendChild(document.createTextNode(text));
  }
  $response.scrollTop = $response.scrollHeight;
}

function clearResponse() {
  $response.textContent = '';
  $response.className = 'section-body';
}

function showError(msg) {
  $error.style.display = 'block';
  $error.textContent = '⚠ ' + msg;
}

// ── Audio playback ───────────────────────────────────────────────────────────
async function playAudio(data) {
  try {
    if (audioCtx.state === 'suspended') await audioCtx.resume();
    const ab = data instanceof Blob ? await data.arrayBuffer() : data;
    const buf = await audioCtx.decodeAudioData(ab.slice(0));
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.connect(audioCtx.destination);
    const t = Math.max(audioCtx.currentTime + 0.02, nextPlayTime);
    src.start(t);
    nextPlayTime = t + buf.duration;
    setStatus('speaking');
    src.onended = () => {
      if (audioCtx.currentTime >= nextPlayTime - 0.05) {
        setStatus('listening');
      }
    };
  } catch (e) {
    console.warn('Audio decode error:', e);
  }
}

// ── WebSocket message handler ─────────────────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'status':
      setStatus(msg.state);
      if (msg.state === 'listening') {
        isCapturing = true;
        nextPlayTime = 0;
      } else if (msg.state === 'thinking' || msg.state === 'speaking') {
        isCapturing = false;
      }
      break;

    case 'ready':
      isCapturing = true;
      break;

    case 'transcript':
      appendTranscript(msg.text);
      break;

    case 'prompt':
      markTranscriptSubmitted();
      postResponse = false;
      clearResponse();
      $response.className = 'section-body thinking-state';
      $response.textContent = '…';
      break;

    case 'response_done':
      postResponse = true;
      resetTranscriptAfterResponse();
      break;

    case 'response_chunk':
      if ($response.className.includes('thinking-state')) {
        $response.textContent = '';
        $response.className = 'section-body';
      }
      appendResponse(msg.text);
      break;

    case 'error':
      showError(msg.message);
      setStatus('error');
      isCapturing = true;
      break;
  }
}

// ── Start session ─────────────────────────────────────────────────────────────
async function startSession() {
  document.getElementById('start-overlay').style.display = 'none';

  // Create AudioContext — don't await resume() here, it needs a real user gesture
  // on some browsers. We resume lazily when playing back audio.
  audioCtx = new AudioContext();

  // Connect WebSocket
  ws = new WebSocket(WS_URL);
  ws.binaryType = 'arraybuffer';

  ws.onopen = async () => {
    try {
      await setupMic();
    } catch (e) {
      showError('Mic error: ' + e.message);
    }
  };

  ws.onmessage = (event) => {
    if (typeof event.data === 'string') {
      handleMessage(JSON.parse(event.data));
    } else {
      // Binary = TTS audio
      playAudio(event.data);
    }
  };

  ws.onclose = () => {
    setStatus('error');
    showError('Disconnected. Reload to reconnect.');
    isCapturing = false;
  };

  ws.onerror = () => {
    showError('WebSocket error. Is the server running?');
  };
}

async function setupMic() {
  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, sampleRate: { ideal: 16000 }, echoCancellation: true },
    video: false,
  });

  // Load AudioWorklet
  const blob = new Blob([WORKLET_CODE], { type: 'application/javascript' });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);
  URL.revokeObjectURL(url);

  const source = audioCtx.createMediaStreamSource(mediaStream);
  workletNode = new AudioWorkletNode(audioCtx, 'audio-capture');

  workletNode.port.onmessage = (e) => {
    if (ws?.readyState === WebSocket.OPEN && isCapturing) {
      ws.send(e.data); // ArrayBuffer of Float32 samples
    }
  };

  source.connect(workletNode);
  // workletNode intentionally NOT connected to destination (silent capture)

  // Tell server the sample rate
  ws.send(JSON.stringify({ type: 'hello', sample_rate: audioCtx.sampleRate }));
}

document.getElementById('start-btn').addEventListener('click', () => {
  startSession().catch(e => showError('Session error: ' + e.message));
});

$sendBtn.addEventListener('click', () => {
  const text = $transcript.innerText.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'submit', text }));
  markTranscriptSubmitted();
});

// Keep screen awake via NoSleep technique (video loop)
// Helps when walking for long sessions
document.getElementById('start-btn').addEventListener('click', () => {
  const vid = document.createElement('video');
  vid.setAttribute('playsinline', '');
  vid.setAttribute('muted', '');
  vid.style.display = 'none';
  // 1x1 transparent mp4 loop - keeps wake lock
  vid.src = 'data:video/mp4;base64,AAAAIGZ0eXBpc29tAAACAGlzb21pc28yYXZjMW1wNDEAAAAIZnJlZQAAA' +
    'CBtZGF0AAACBQYCB//wD8AAABwBQYHCIiIkxKA0AAAAHwEB8AAAAD/4AAAAfwH8AAAAD/4AAAAf' +
    'wH8AAAAD/4AAAAfwH8AAAAD/4AAAAfwH8AAAAD/';
  document.body.appendChild(vid);
  vid.play().catch(() => {});
}, { once: true });
</script>
</body>
</html>
